<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Real Estate Dates AI Knowledge Hub</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
<style>
:root{--bg:#0a0a0f;--surface:#131320;--border:#1e1e32;--text:#e8e8f0;--text-secondary:#8888a0;--accent:#6c5ce7;--accent-glow:rgba(108,92,231,0.3);--legal:#e17055;--medical:#00b894;--msk:#fdcb6e;--imaging:#0984e3}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.7;min-height:100vh}
.container{max-width:860px;margin:0 auto;padding:0 24px}
nav{padding:18px 0;border-bottom:1px solid var(--border);margin-bottom:48px}
nav a{color:var(--accent);text-decoration:none;font-size:0.9rem}
nav a:hover{text-decoration:underline}
h1{font-size:2rem;margin-bottom:8px}
.meta{color:var(--text-secondary);font-size:0.85rem;margin-bottom:32px;display:flex;gap:16px;flex-wrap:wrap}
.domain-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:0.75rem;font-weight:600;text-transform:uppercase}
.domain-badge.legal{background:rgba(225,112,85,0.15);color:var(--legal)}
.domain-badge.medical{background:rgba(0,184,148,0.15);color:var(--medical)}
.content{font-size:1.05rem;line-height:1.8}
.content h2{font-size:1.5rem;margin:36px 0 16px;color:var(--accent)}
.content h3{font-size:1.2rem;margin:24px 0 12px}
.content p{margin-bottom:16px;color:var(--text-secondary)}
.content ul{margin:16px 0;padding-left:24px}
.content li{margin-bottom:8px;color:var(--text-secondary)}
.content strong{color:var(--text)}
.disclaimer{margin-top:48px;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:0.85rem;color:var(--text-secondary)}
footer{padding:40px 0;text-align:center;color:var(--text-secondary);font-size:0.8rem;border-top:1px solid var(--border);margin-top:64px}
.loading{text-align:center;padding:80px 0;color:var(--text-secondary)}
.error{text-align:center;padding:80px 0;color:var(--legal)}
@media(max-width:768px){h1{font-size:1.5rem}.content{font-size:1rem}}
</style>
</head>
<body>
<nav><div class="container"><a href="/">← Back to Home</a></div></nav>
<main class="container" id="main">
<div class="loading" id="loading">Loading article...</div>
<div class="error" id="error" style="display:none">Article not found. <a href="/">Go back home</a></div>
</main>
<footer><div class="container">Powered by RAG Engine · BGE-M3 Embeddings · Real Estate Dates AI</div></footer>

<script>
const slug = new URLSearchParams(window.location.search).get('slug');
if (!slug) { document.getElementById('loading').style.display='none'; document.getElementById('error').style.display='block'; }
else {
fetch('/api/blog?slug=' + encodeURIComponent(slug))
.then(r => r.json())
.then(data => {
const doc = document.getElementById('loading');
if (data.posts && data.posts.length > 0) {
const p = data.posts[0];
const date = new Date(p.created_at).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
const tags = (p.tags||[]).map(t => '#'+t).join(' ');
document.getElementById('main').innerHTML = `
<article>
<h1>${escHtml(p.title)}</h1>
<div class="meta">
<span class="domain-badge ${p.domain}">${p.domain}</span>
<span>${date}</span>
<span>${p.word_count||'?'} words</span>
<span>${tags}</span>
</div>
<div class="content">${p.content}</div>
<div class="disclaimer"><strong>Disclaimer:</strong> This article was AI-generated from verified legal and medical reference materials in the RAG knowledge base. It is for informational purposes only and does not constitute legal or medical advice.</div>
</article>`;
} else {
document.getElementById('loading').style.display='none';
document.getElementById('error').style.display='block';
}
})
.catch(() => { document.getElementById('loading').style.display='none'; document.getElementById('error').style.display='block'; });
}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
</script>
</body>
</html>
